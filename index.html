        const isLocalDev = localHosts.has(window.location.hostname);
        if (isLocalDev) {
          return;
        }

        }

        const base = "/";
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${base}assets/main.css`;
